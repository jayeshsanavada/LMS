<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AZ-LMS — Notifications</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .notif-item {
      display:flex;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);
      cursor:pointer;transition:background .12s;
    }
    .notif-item:hover { background:#f8fafc; }
    .notif-item.unread { background:#f0f7ff; }
    .notif-item.unread:hover { background:#e0efff; }
    .notif-icon-wrap {
      width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:17px;flex-shrink:0;
    }
    .notif-title { font-size:13.5px;font-weight:600;margin-bottom:2px; }
    .notif-body  { font-size:12.5px;color:var(--text-muted);line-height:1.45; }
    .notif-meta  { font-size:11.5px;color:var(--text-muted);margin-top:4px;display:flex;gap:10px; }
    .notif-unread-dot {
      width:8px;height:8px;border-radius:50%;background:var(--primary);
      flex-shrink:0;margin-top:6px;
    }
  </style>
</head>
<body>
<div class="lms-wrapper">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Notifications</div>
      <div class="topbar-actions">
        <div class="role-switcher" id="role-switcher"></div>
        <button class="btn-outline-lms" style="font-size:12px;padding:6px 12px" onclick="markAllRead()">
          <i class="bi bi-check2-all"></i> Mark All Read
        </button>
        <div style="position:relative">
          <button class="notif-btn" id="notif-btn" onclick="toggleNotif()">
            <i class="bi bi-bell"></i>
          </button>
          <div class="notif-dropdown" id="notif-dropdown">
            <div class="notif-dropdown-header"><span>Notifications</span><a href="#">Mark all read</a></div>
          </div>
        </div>
      </div>
    </div>

    <div class="page-body">

      <!-- Stat Cards -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon blue"><i class="bi bi-bell"></i></div>
            <div class="stat-info"><div class="stat-value" id="total-count">0</div><div class="stat-label">Total</div></div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon red"><i class="bi bi-circle-fill"></i></div>
            <div class="stat-info"><div class="stat-value" id="unread-count">0</div><div class="stat-label">Unread</div></div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon amber"><i class="bi bi-exclamation-circle"></i></div>
            <div class="stat-info"><div class="stat-value" id="alert-count">0</div><div class="stat-label">Alerts</div></div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon green"><i class="bi bi-info-circle"></i></div>
            <div class="stat-info"><div class="stat-value" id="info-count">0</div><div class="stat-label">Informational</div></div>
          </div>
        </div>
      </div>

      <!-- Tabs & Filter Row -->
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:4px">
        <div class="tabs-lms" style="margin-bottom:0">
          <a class="tab-item active" onclick="filterTab('all',this)">All</a>
          <a class="tab-item" onclick="filterTab('unread',this)">Unread</a>
          <a class="tab-item" onclick="filterTab('training',this)">Training</a>
          <a class="tab-item" onclick="filterTab('compliance',this)">Compliance</a>
          <a class="tab-item" onclick="filterTab('session',this)">Sessions</a>
          <a class="tab-item" onclick="filterTab('system',this)">System</a>
        </div>
      </div>

      <!-- Notifications List -->
      <div class="card" id="notif-list" style="padding:0;overflow:hidden">
        <!-- Populated by JS -->
      </div>

    </div>
  </div>
</div>

<div id="toast-container" style="position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/nav.js"></script>
<script>
  /* All notifications per role */
  const ALL_NOTIFS = {
    employee: [
      { id:1,  type:'training',   icon:'bi-journal-bookmark',  color:'#3b82f6', title:'New training assigned',           body:'Anti-Harassment Policy has been assigned to you. Due date: Apr 30, 2026.',          time:'2 hours ago',  date:'Apr 7, 2026', unread:true  },
      { id:2,  type:'training',   icon:'bi-exclamation-circle',color:'#ef4444', title:'Training overdue',                body:'Safety Compliance 2026 was due Apr 1, 2026. Please complete it immediately.',         time:'1 day ago',    date:'Apr 6, 2026', unread:true  },
      { id:3,  type:'training',   icon:'bi-award',             color:'#22c55e', title:'Certificate issued',              body:'Your certificate for Code of Conduct is ready. Click to download.',                   time:'2 days ago',   date:'Apr 5, 2026', unread:false },
      { id:4,  type:'training',   icon:'bi-check2-circle',     color:'#22c55e', title:'Training completed',              body:'You have successfully completed Data Privacy Training. Score: 91%.',                  time:'5 days ago',   date:'Apr 2, 2026', unread:false },
      { id:5,  type:'session',    icon:'bi-camera-video',      color:'#6366f1', title:'Session reminder',                body:'Safety Compliance Workshop starts in 24 hours. Apr 15, 2026 at 10:00 AM.',            time:'6 days ago',   date:'Apr 1, 2026', unread:false },
      { id:6,  type:'compliance', icon:'bi-clock',             color:'#f59e0b', title:'Completion expiring soon',        body:'Your Anti-Harassment Policy completion expires in 12 days. Apr 19, 2026.',            time:'1 week ago',   date:'Mar 31, 2026',unread:false },
    ],
    manager: [
      { id:1,  type:'training',   icon:'bi-check2-circle',     color:'#22c55e', title:'Enrollment request approved',     body:'You approved Rahul Sharma for Leadership Essentials.',                               time:'1 hour ago',   date:'Apr 7, 2026', unread:true  },
      { id:2,  type:'compliance', icon:'bi-person-exclamation',color:'#f59e0b', title:'Team member overdue',             body:'Arjun Nair — Data Privacy Training is 3 days overdue.',                             time:'5 hours ago',  date:'Apr 7, 2026', unread:true  },
      { id:3,  type:'training',   icon:'bi-clock',             color:'#f59e0b', title:'Approval pending',                body:'2 enrollment requests are awaiting your review.',                                    time:'1 day ago',    date:'Apr 6, 2026', unread:true  },
      { id:4,  type:'training',   icon:'bi-bar-chart',         color:'#6366f1', title:'Weekly team report ready',        body:'Your team compliance rate is 82% this week. 3 members need attention.',              time:'2 days ago',   date:'Apr 5, 2026', unread:false },
      { id:5,  type:'training',   icon:'bi-people',            color:'#3b82f6', title:'New team member',                 body:'Rohan Verma has joined your team.',                                                  time:'3 days ago',   date:'Apr 4, 2026', unread:false },
      { id:6,  type:'session',    icon:'bi-camera-video',      color:'#6366f1', title:'Session attendance pulled',       body:'Teams attendance for Code of Conduct Refresher (SES-010) has been synced.',          time:'5 days ago',   date:'Apr 2, 2026', unread:false },
    ],
    hr: [
      { id:1,  type:'compliance', icon:'bi-shield-x',          color:'#ef4444', title:'Compliance alert — 31 non-compliant', body:'31 employees have not completed all mandatory training for this period.',          time:'3 hours ago',  date:'Apr 7, 2026', unread:true  },
      { id:2,  type:'compliance', icon:'bi-clock-history',     color:'#f59e0b', title:'27 completions expiring soon',    body:'27 employee completions will expire within the next 30 days. Review now.',           time:'1 day ago',    date:'Apr 6, 2026', unread:true  },
      { id:3,  type:'system',     icon:'bi-person-plus',       color:'#22c55e', title:'New employee synced',             body:'Rohan Verma (Engineering) has been added via Zoho HR sync.',                        time:'2 days ago',   date:'Apr 5, 2026', unread:false },
      { id:4,  type:'training',   icon:'bi-mortarboard',       color:'#3b82f6', title:'Mandatory training updated',      body:'Safety Compliance 2026 has been updated to v2. Affected employees notified.',        time:'3 days ago',   date:'Apr 4, 2026', unread:false },
      { id:5,  type:'compliance', icon:'bi-shield-check',      color:'#22c55e', title:'Compliance improved',             body:'Overall compliance rate improved from 80% to 82% this week.',                       time:'5 days ago',   date:'Apr 2, 2026', unread:false },
    ],
    admin: [
      { id:1,  type:'training',   icon:'bi-mortarboard',       color:'#3b82f6', title:'Training published',              body:'Safety Compliance 2026 v2 has been published and is now live in the catalog.',       time:'1 hour ago',   date:'Apr 7, 2026', unread:true  },
      { id:2,  type:'system',     icon:'bi-plug',              color:'#f59e0b', title:'Integration warning — OneDrive',  body:'OneDrive upload latency is elevated (avg 4.2s, threshold 2s). Monitor.',             time:'3 hours ago',  date:'Apr 7, 2026', unread:false },
      { id:3,  type:'compliance', icon:'bi-shield-x',          color:'#ef4444', title:'Compliance alert',                body:'31 employees are non-compliant for this period. Review in Compliance section.',      time:'1 day ago',    date:'Apr 6, 2026', unread:false },
      { id:4,  type:'training',   icon:'bi-clipboard-x',       color:'#ef4444', title:'Assessment attempts exhausted',   body:'Vikram Reddy has exhausted all attempts for Data Privacy Quiz. Admin action needed.', time:'2 days ago',   date:'Apr 5, 2026', unread:false },
      { id:5,  type:'session',    icon:'bi-camera-video',      color:'#22c55e', title:'Session completed',               body:'Anti-Harassment Policy Briefing (SES-004) has been marked as completed. 25 attended.', time:'3 days ago', date:'Apr 4, 2026', unread:false },
      { id:6,  type:'system',     icon:'bi-person-plus',       color:'#22c55e', title:'New user added',                  body:'Rohan Verma (Engineering) has been added via Zoho HR sync.',                        time:'4 days ago',   date:'Apr 3, 2026', unread:false },
    ],
  };

  let activeTab  = 'all';
  let notifData  = [];

  function loadNotifications() {
    const role = localStorage.getItem('lms_role') || 'employee';
    notifData  = ALL_NOTIFS[role] || [];

    // Update stat cards
    document.getElementById('total-count').textContent  = notifData.length;
    document.getElementById('unread-count').textContent = notifData.filter(n => n.unread).length;
    document.getElementById('alert-count').textContent  = notifData.filter(n => n.type === 'compliance').length;
    document.getElementById('info-count').textContent   = notifData.filter(n => n.type === 'system' || n.type === 'training').length;

    renderList();
  }

  function renderList() {
    const list = document.getElementById('notif-list');
    let items   = notifData;

    if (activeTab === 'unread')     items = items.filter(n => n.unread);
    else if (activeTab !== 'all')   items = items.filter(n => n.type === activeTab);

    if (items.length === 0) {
      list.innerHTML = `
        <div style="text-align:center;padding:48px 20px;color:var(--text-muted)">
          <i class="bi bi-bell-slash" style="font-size:36px;display:block;margin-bottom:10px"></i>
          No notifications in this category
        </div>`;
      return;
    }

    list.innerHTML = items.map(n => `
      <div class="notif-item ${n.unread ? 'unread' : ''}" onclick="readNotif(${n.id}, this)">
        <div class="notif-icon-wrap" style="background:${n.color}20">
          <i class="bi ${n.icon}" style="color:${n.color}"></i>
        </div>
        <div style="flex:1;min-width:0">
          <div class="notif-title">${n.title}</div>
          <div class="notif-body">${n.body}</div>
          <div class="notif-meta">
            <span>${n.time}</span>
            <span>·</span>
            <span>${n.date}</span>
            <span>·</span>
            <span style="text-transform:capitalize">${n.type}</span>
          </div>
        </div>
        ${n.unread ? '<div class="notif-unread-dot"></div>' : '<div style="width:8px;flex-shrink:0"></div>'}
      </div>
    `).join('');
  }

  function filterTab(tab, el) {
    activeTab = tab;
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderList();
  }

  function readNotif(id, el) {
    const n = notifData.find(x => x.id === id);
    if (n) {
      n.unread = false;
      el.classList.remove('unread');
      const dot = el.querySelector('.notif-unread-dot');
      if (dot) dot.remove();
      // update unread count
      document.getElementById('unread-count').textContent = notifData.filter(x => x.unread).length;
    }
  }

  function markAllRead() {
    notifData.forEach(n => n.unread = false);
    document.getElementById('unread-count').textContent = 0;
    renderList();
    showToast('All notifications marked as read');
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast-lms show';
    t.innerHTML = '<i class="bi bi-check-circle-fill" style="color:var(--success)"></i> ' + msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  document.addEventListener('DOMContentLoaded', loadNotifications);
</script>
</body>
</html>
